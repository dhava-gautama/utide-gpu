name: Publish to PyPI

# Builds the distributions and publishes them to PyPI when a GitHub Release is
# published, using PyPI Trusted Publishing (OIDC) -- no API token/secret needed.
# To enable: on PyPI, add a trusted publisher for the project "utide-gpu"
# pointing to this repository and workflow (pypi.yml), then publish a Release.
on:
  release:
    types: [ published ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tags, for setuptools_scm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Check distributions
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
