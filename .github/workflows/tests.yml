name: Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11", "3.12", "3.13" ]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tags, so setuptools_scm can resolve the version

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy pytest
          python -m pip install -e . --no-deps

      - name: Run tests
        # GPU tests auto-skip when CuPy is not present (no GPU on CI runners).
        run: pytest -rxs tests
